name: collect-iz-ai

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run collector
        run: node scripts/collector.mjs

      - name: Commit data if changed
        run: |
          if [ -z "$(git status --porcelain data/reports.json)" ]; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/reports.json
          git commit -m "update reports data"
          git push
